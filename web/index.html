<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CAT-Psych</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="intro">
        <img
          src="https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1200&q=80"
          alt="Quiet workspace"
        />
        <div>
          <p class="eyebrow">CAT-Psych</p>
          <h1>Adaptive trait check-in</h1>
          <p class="notice" id="notice">
            本系统仅作为心理特质筛查与辅助参考工具，绝对不可替代专业精神科临床诊断。
          </p>
        </div>
      </section>

      <section class="controls">
        <label>
          Model
          <select id="model">
            <option value="binary_2pl">binary_2pl</option>
            <option value="grm">grm</option>
          </select>
        </label>
        <label>
          Items
          <input id="maxItems" type="number" min="1" max="50" value="12" />
        </label>
        <button id="startBtn">Start</button>
      </section>

      <section class="question-area" id="questionArea" hidden>
        <p class="progress" id="progress"></p>
        <h2 id="questionText"></h2>
        <div class="responses" id="responses"></div>
      </section>

      <section class="results" id="results" hidden>
        <h2>Results</h2>
        <div class="score-grid">
          <div>
            <h3>IRT tendency T scores</h3>
            <dl id="irtScores"></dl>
          </div>
          <div>
            <h3>Classical Big Five comparison</h3>
            <dl id="classicalScores"></dl>
          </div>
        </div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
