services:
  cat-psych:
    build:
      context: .
      dockerfile: Dockerfile
    image: cat-psych:cpu
    ports:
      - "8000:8000"
    environment:
      CAT_PSYCH_SESSION_BACKEND: json
      CAT_PSYCH_SESSION_DIR: /app/data/sessions
      CAT_PSYCH_SESSION_TTL_SECONDS: "7200"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
